project:
  seed: 42
data:
  dataset: loveda
  data_root: MUST_BE_SET
  num_classes: 7
  ignore_index: 255
  crop_size: 512
  stride: 32
  num_workers: 8
  class_names:
  - Background
  - Building
  - Road
  - Water
  - Barren
  - Forest
  - Agricultural
  augmentation:
    random_flip: true
    random_scale:
    - 0.5
    - 2.0
    random_crop: true
    color_jitter: false
model:
  backbone: segformer_b2
  backbone_slug: segformer_b2
  pretrained: true
  pretrained_path: null
train:
  epochs: 100
  batch_size: 4
  optimizer: adamw
  lr: 0.0006
  weight_decay: 0.01
  scheduler: cosine
  amp: true
  grad_clip: 1.0
  save_every_n_epochs: 10
eval:
  metrics:
  - miou
  - mf1
  - oa
  - bf1_3
  - bf1_5
  boundary_widths:
  - 3
  - 5
  sliding_window:
    enabled: true
    crop_size: 512
    stride: 32
