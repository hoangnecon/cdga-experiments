# Base configuration for UNetFormer (ResNet-18) on ISPRS Vaihingen
# File: experiments/configs/base/group_a/unetformer_r18_vaihingen.yaml

project:
  seed: 42

data:
  dataset: vaihingen
  data_root: MUST_BE_SET
  num_classes: 6
  ignore_index: 255
  crop_size: 512
  stride: 32
  num_workers: 8
  class_names:
    - Impervious_surfaces
    - Building
    - Low_vegetation
    - Tree
    - Car
    - Clutter_Background
  augmentation:
    random_flip: true
    random_scale: [0.5, 2.0]
    random_crop: true
    color_jitter: false

model:
  backbone: unetformer_r18
  backbone_slug: unetformer_r18
  pretrained: true
  pretrained_path: null

train:
  epochs: 100
  batch_size: 8
  optimizer: adamw
  lr: 6.0e-4
  weight_decay: 0.01
  scheduler: cosine
  eta_min: 1.0e-6
  amp: true
  grad_clip: 1.0
  save_every_n_epochs: 10

eval:
  metrics:
    - miou
    - mf1
    - oa
    - bf1_3
    - bf1_5
  boundary_widths: [3, 5]
  sliding_window:
    enabled: true
    crop_size: 512
    stride: 32
