# Environment config for Google Colab
# File: configs/env/colab.yaml
# NOTE: data_root points to Google Drive. For better GPU utilization,
# copy data to local SSD first: cp -r $DRIVE/data/vaihingen /content/data/
# then override data_root here or via --override data.data_root=/content/data/vaihingen

data:
  data_root: /content/drive/MyDrive/WACV_EXP/data/vaihingen
  num_workers: 2

output:
  runs_dir: /content/drive/MyDrive/WACV_EXP/experiments/runs
